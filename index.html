
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Horario · Ángel Omar</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --c1: #4ade80;
  --c2: #60a5fa;
  --c3: #f472b6;
  --c4: #fb923c;
  --clib: rgba(255,255,255,0.3);
  --ctut: #a78bfa;
  --ccol: #fbbf24;
  --white: rgba(255,255,255,0.92);
  --white2: rgba(255,255,255,0.55);
  --white3: rgba(255,255,255,0.3);
  --glass: rgba(255,255,255,0.1);
  --glass2: rgba(255,255,255,0.07);
  --border-g: rgba(255,255,255,0.18);
  --shadow: 0 8px 32px rgba(0,0,0,0.25);
}

html { font-size: 16px; }

body {
  font-family: 'Outfit', sans-serif;
  font-weight: 400;
  min-height: 100vh;
  overflow-x: hidden;
  background: #0a1628;
  color: var(--white);
  -webkit-font-smoothing: antialiased;
}

/* ── FONDO ANIMADO ── */
.bg {
  position: fixed; inset: 0; z-index: 0; overflow: hidden;
  background: linear-gradient(135deg, #0d1b3e 0%, #0a2050 40%, #061235 100%);
}
.orb {
  position: absolute; border-radius: 50%;
  filter: blur(80px); opacity: 0.55;
  animation: drift 12s ease-in-out infinite alternate;
}
.orb1 { width: 420px; height: 420px; background: #1a4fd6; top: -120px; right: -80px; animation-delay: 0s; }
.orb2 { width: 320px; height: 320px; background: #0ea5e9; bottom: 10%; left: -80px; animation-delay: -4s; }
.orb3 { width: 260px; height: 260px; background: #3b82f6; top: 40%; right: -60px; animation-delay: -8s; opacity: 0.35; }
@keyframes drift {
  from { transform: translate(0,0) scale(1); }
  to   { transform: translate(20px,30px) scale(1.08); }
}

/* ── GRID SUTIL ── */
.bg::after {
  content: '';
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
  background-size: 40px 40px;
}

/* ── LAYOUT ── */
#app { position: relative; z-index: 1; max-width: 520px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }

/* ── HEADER ── */
header {
  padding: 20px 20px 0;
  position: sticky; top: 0; z-index: 100;
}
.header-glass {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid var(--border-g);
  border-radius: 20px;
  padding: 16px 20px;
  display: flex; justify-content: space-between; align-items: center;
  box-shadow: var(--shadow);
}
.h-left {}
.school-tag { font-size: 10px; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; color: var(--white3); margin-bottom: 2px; }
.teacher-name { font-size: 17px; font-weight: 600; color: var(--white); line-height: 1.2; }
.h-right { text-align: right; }
#live-clock { font-size: 30px; font-weight: 300; letter-spacing: -0.02em; color: var(--white); font-variant-numeric: tabular-nums; line-height: 1; }
.clock-sub { font-size: 10px; font-weight: 400; letter-spacing: 0.1em; text-transform: uppercase; color: var(--white3); margin-top: 2px; }

/* ── TABS ── */
.tabs-wrap { padding: 14px 20px 0; }
.tabs {
  display: flex; gap: 6px;
  background: rgba(255,255,255,0.07);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid var(--border-g);
  border-radius: 14px;
  padding: 5px;
}
.tab {
  flex: 1;
  padding: 9px 6px;
  background: transparent; border: none;
  border-radius: 10px;
  color: var(--white2);
  font-family: 'Outfit', sans-serif;
  font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all 0.22s;
  white-space: nowrap;
}
.tab.active {
  background: rgba(255,255,255,0.15);
  color: var(--white);
  box-shadow: 0 2px 12px rgba(0,0,0,0.2);
  backdrop-filter: blur(8px);
}

/* ── MAIN ── */
main { padding: 16px 20px 50px; flex: 1; }
.view { display: none; animation: fadeUp 0.3s ease; }
.view.active { display: block; }
@keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

/* ── GLASS CARD ── */
.g-card {
  background: rgba(255,255,255,0.09);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--border-g);
  border-radius: 20px;
  padding: 20px;
  box-shadow: var(--shadow);
  margin-bottom: 12px;
  position: relative; overflow: hidden;
}
.g-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
}

/* CARD ACTUAL */
.card-accent-bar {
  position: absolute; top: 0; left: 0;
  width: 4px; height: 100%;
  border-radius: 20px 0 0 20px;
}
.card-inner { padding-left: 14px; }
.card-eyebrow {
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.15em; text-transform: uppercase;
  color: var(--white3); margin-bottom: 6px;
}
.card-class { font-size: 24px; font-weight: 700; color: var(--white); line-height: 1.15; margin-bottom: 3px; }
.card-time { font-size: 12px; font-weight: 400; color: var(--white2); margin-bottom: 18px; }

/* PROGRESO */
.prog-row { display: flex; justify-content: space-between; font-size: 11px; color: var(--white3); margin-bottom: 7px; font-weight: 500; }
.prog-rem { color: var(--white2); }
.prog-track {
  height: 6px;
  background: rgba(255,255,255,0.12);
  border-radius: 100px; overflow: hidden; margin-bottom: 16px;
}
.prog-fill {
  height: 100%; border-radius: 100px;
  transition: width 1s linear;
  position: relative;
}
.prog-fill::after {
  content: ''; position: absolute;
  right: 0; top: 0; bottom: 0; width: 30px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4));
}

/* OBS BTN */
.obs-btn {
  display: flex; align-items: center; justify-content: space-between;
  width: 100%; padding: 12px 14px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 12px;
  color: var(--white2);
  font-family: 'Outfit', sans-serif;
  font-size: 13px; font-weight: 500;
  cursor: pointer; transition: background 0.2s;
}
.obs-btn:active { background: rgba(255,255,255,0.14); }
.obs-btn.noted { border-color: rgba(255,255,255,0.3); color: var(--white); }
.obs-arrow { font-size: 18px; opacity: 0.5; }
.note-dot {
  display: inline-block; width: 6px; height: 6px;
  border-radius: 50%;
  margin-left: 7px; vertical-align: middle; position: relative; top:-1px;
}

/* FREE / RECREO */
.free-card {
  text-align: center; padding: 32px 20px;
}
.free-icon { font-size: 32px; margin-bottom: 10px; }
.free-label { font-size: 20px; font-weight: 600; color: var(--white); margin-bottom: 4px; }
.free-sub { font-size: 12px; color: var(--white3); letter-spacing: 0.04em; }

/* SIGUIENTE */
.next-card {
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 22px;
}
.next-stripe { width: 3px; align-self: stretch; min-height: 44px; border-radius: 3px; flex-shrink: 0; }
.next-eyebrow { font-size: 10px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--white3); margin-bottom: 3px; }
.next-name { font-size: 15px; font-weight: 600; color: var(--white); margin-bottom: 2px; }
.next-time { font-size: 11px; color: var(--white3); }
.next-eta { font-size: 14px; font-weight: 700; margin-left: auto; white-space: nowrap; flex-shrink: 0; }

/* DIVIDER */
.divider {
  display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
}
.divider-lbl { font-size: 10px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--white3); white-space: nowrap; }
.divider-line { flex: 1; height: 1px; background: rgba(255,255,255,0.1); }

/* TIMELINE */
.timeline { display: flex; flex-direction: column; }
.tl-row {
  display: flex; align-items: stretch; gap: 14px;
  padding-bottom: 14px; opacity: 0.4; transition: opacity 0.2s;
}
.tl-row.current, .tl-row.future { opacity: 1; }
.tl-gutter { display: flex; flex-direction: column; align-items: center; width: 42px; flex-shrink: 0; }
.tl-t { font-size: 11px; color: var(--white3); font-weight: 500; letter-spacing: 0.02em; line-height: 1; padding-top: 2px; }
.tl-line { flex: 1; width: 1px; background: rgba(255,255,255,0.1); margin-top: 7px; }
.tl-body { flex: 1; display: flex; align-items: flex-start; gap: 10px; }
.tl-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 3px; }
.tl-row.current .tl-dot { width: 10px; height: 10px; margin-top: 2px; }
.tl-text { flex: 1; }
.tl-name { font-size: 14px; font-weight: 400; color: var(--white); margin-bottom: 1px; }
.tl-row.current .tl-name { font-weight: 600; }
.tl-until { font-size: 11px; color: var(--white3); }

/* DAY CHIPS */
.day-chips {
  display: flex; margin-bottom: 16px;
  background: rgba(255,255,255,0.07);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--border-g);
  border-radius: 14px; padding: 4px; gap: 4px;
  overflow-x: auto; scrollbar-width: none;
}
.day-chips::-webkit-scrollbar { display: none; }
.day-chip {
  flex: 1; min-width: 50px; padding: 9px 4px;
  background: transparent; border: none; border-radius: 10px;
  color: var(--white2);
  font-family: 'Outfit', sans-serif; font-size: 12px; font-weight: 500;
  cursor: pointer; text-align: center;
  transition: background 0.18s, color 0.18s;
  letter-spacing: 0.04em; white-space: nowrap;
}
.day-chip.active { background: rgba(255,255,255,0.15); color: var(--white); }

/* SCHEDULE ROWS */
.year-group { margin-bottom: 24px; }
.year-head {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 10px; padding-bottom: 10px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}
.year-swatch { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.year-htitle { font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; }
.year-ct { margin-left: auto; font-size: 11px; color: var(--white3); }

.sched-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 11px 14px 11px 16px; gap: 10px;
  background: rgba(255,255,255,0.05);
  border-radius: 12px; margin-bottom: 6px;
  border-left: 3px solid transparent;
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
}
.sched-name { font-size: 14px; font-weight: 400; color: var(--white); flex: 1; }
.sched-right { display: flex; flex-direction: column; align-items: flex-end; gap: 1px; flex-shrink: 0; }
.sched-day { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--white3); }
.sched-time { font-size: 11px; color: var(--white3); font-weight: 400; }

.now-meta { font-size: 11px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--white3); margin-bottom: 16px; }

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(5,15,40,0.65);
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  display: none; align-items: flex-end; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: rgba(10,25,65,0.85);
  backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
  border: 1px solid rgba(255,255,255,0.15);
  border-bottom: none; border-radius: 24px 24px 0 0;
  padding: 0 0 52px; width: 100%; max-width: 520px;
  max-height: 88vh; overflow-y: auto;
  transform: translateY(100%);
  transition: transform 0.28s cubic-bezier(0.32,0.72,0,1);
  box-shadow: 0 -20px 60px rgba(0,0,0,0.4);
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal-pull { display: flex; justify-content: center; padding: 14px 0 10px; }
.modal-handle { width: 38px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 100px; }
.modal-hd {
  padding: 4px 20px 18px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  margin-bottom: 22px; position: relative;
}
.modal-close {
  position: absolute; right: 16px; top: 0;
  background: rgba(255,255,255,0.1); border: none;
  color: var(--white2); width: 30px; height: 30px;
  border-radius: 50%; font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.modal-eyebrow { font-size: 10px; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; color: var(--white3); margin-bottom: 4px; }
.modal-title { font-size: 22px; font-weight: 700; color: var(--white); line-height: 1.15; padding-right: 36px; }
.modal-body { padding: 0 20px; }
.note-block { margin-bottom: 16px; }
.note-label { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--white2); margin-bottom: 7px; }
textarea {
  width: 100%;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 12px; color: var(--white);
  font-family: 'Outfit', sans-serif; font-size: 14px;
  font-weight: 300; line-height: 1.6;
  padding: 12px 14px; resize: none; outline: none;
  transition: border-color 0.15s;
}
textarea:focus { border-color: rgba(255,255,255,0.35); }
textarea::placeholder { color: rgba(255,255,255,0.25); }
.modal-save {
  width: 100%; padding: 14px;
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.25);
  border-radius: 14px; color: var(--white);
  font-family: 'Outfit', sans-serif; font-size: 15px; font-weight: 600;
  cursor: pointer; letter-spacing: 0.03em;
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  transition: background 0.18s;
}
.modal-save:active { background: rgba(255,255,255,0.22); }
.saved-wrap { margin-top: 22px; padding-top: 18px; border-top: 1px solid rgba(255,255,255,0.1); }
.saved-key { font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--white3); margin-bottom: 4px; }
.saved-val { font-size: 14px; font-weight: 300; color: var(--white2); line-height: 1.6; white-space: pre-wrap; margin-bottom: 14px; }

/* TOAST */
.toast {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(8px);
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.2);
  color: var(--white); padding: 11px 24px;
  border-radius: 100px; font-size: 13px; font-weight: 500;
  letter-spacing: 0.04em; opacity: 0;
  transition: all 0.22s; z-index: 300;
  white-space: nowrap; pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.empty-state { text-align: center; padding: 36px 20px; color: var(--white3); font-size: 13px; }
</style>
</head>
<body>

<div class="bg">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<div id="app">
  <header>
    <div class="header-glass">
      <div class="h-left">
        <div class="school-tag">UCV College 2026 · Turno tarde</div>
        <div class="teacher-name">Ángel Omar Oliden</div>
      </div>
      <div class="h-right">
        <div id="live-clock">--:--</div>
        <div class="clock-sub" id="clock-day">—</div>
      </div>
    </div>
  </header>

  <div class="tabs-wrap">
    <div class="tabs">
      <button class="tab active" onclick="switchView('now',this)">Ahora</button>
      <button class="tab" onclick="switchView('day',this)">Mi día</button>
      <button class="tab" onclick="switchView('week',this)">Semana</button>
      <button class="tab" onclick="switchView('full',this)">Horario</button>
    </div>
  </div>

  <main>
    <div class="view active" id="view-now">
      <div class="now-meta" id="now-date">—</div>
      <div id="now-content"></div>
      <div id="next-content"></div>
      <div id="today-tl"></div>
    </div>
    <div class="view" id="view-day">
      <div class="day-chips" id="day-chips"></div>
      <div id="day-tl"></div>
    </div>
    <div class="view" id="view-week"><div id="week-content"></div></div>
    <div class="view" id="view-full"><div id="full-content"></div></div>
  </main>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeOutside(event)">
  <div class="modal">
    <div class="modal-pull"><div class="modal-handle"></div></div>
    <div class="modal-hd">
      <button class="modal-close" onclick="closeModal()">×</button>
      <div class="modal-eyebrow" id="m-eyebrow">—</div>
      <div class="modal-title" id="m-title">—</div>
    </div>
    <div class="modal-body">
      <div class="note-block">
        <div class="note-label">Observación general</div>
        <textarea id="n-obs" rows="3" placeholder="Desarrollo de la sesión, temas trabajados…"></textarea>
      </div>
      <div class="note-block">
        <div class="note-label">Alumnos destacados</div>
        <textarea id="n-dest" rows="2" placeholder="Nombres y motivo del reconocimiento…"></textarea>
      </div>
      <div class="note-block">
        <div class="note-label">Incidencias</div>
        <textarea id="n-inc" rows="2" placeholder="Conducta, ausencias, situaciones a reportar…"></textarea>
      </div>
      <button class="modal-save" onclick="saveNotes()">Guardar</button>
      <div id="saved-preview"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast">Guardado</div>

<script>
const SLOTS = [
  {id:'s1',start:'13:10',end:'13:55'},
  {id:'s2',start:'13:55',end:'14:40'},
  {id:'s3',start:'14:40',end:'15:25'},
  {id:'rec',start:'15:25',end:'15:40',rec:true},
  {id:'s4',start:'15:40',end:'16:25'},
  {id:'s5',start:'16:25',end:'17:10'},
  {id:'s6',start:'17:10',end:'17:55'},
  {id:'s7',start:'17:55',end:'18:40'},
];
const SCHED = {
  lunes:    {s1:'2° G',s2:'2° F',s3:'2° A',s4:'1° G',s5:'1° B',s6:'2° B',s7:'COLEGIADA'},
  martes:   {s1:'TUT:1° D',s2:'LIBRE',s3:'3° D',s4:'1° D',s5:'2° D',s6:'PPFF',s7:'3° G'},
  miercoles:{s1:'3° A',s2:'LIBRE',s3:'3° F',s4:'4° D',s5:'2° C',s6:'1° A',s7:'LIBRE'},
  jueves:   {s1:'4° B',s2:'1° C',s3:'1° E',s4:'2° E',s5:'LIBRE',s6:'4° C',s7:'3° B'},
  viernes:  {s1:'1° H',s2:'2° H',s3:'1° F',s4:'3° C',s5:'LIBRE',s6:'4° A',s7:'3° E'},
};
const YC = {1:'#4ade80',2:'#60a5fa',3:'#f472b6',4:'#fb923c',0:'rgba(255,255,255,0.4)'};

function parse(raw) {
  if (!raw||raw==='LIBRE') return null;
  if (raw==='COLEGIADA') return {label:'Hora colegiada común',color:'#fbbf24',year:0,type:'col'};
  if (raw==='PPFF')      return {label:'Atención a PP.FF',color:'#fbbf24',year:0,type:'ppff'};
  if (raw.startsWith('TUT:')) return {label:'Tutoría — '+raw.slice(4),color:'#a78bfa',year:parseInt(raw.slice(4))||0,type:'tut'};
  const m=raw.match(/^(\d)°\s+([A-Z])$/);
  if(m){const y=parseInt(m[1]);return {label:'Plan Lector — '+raw,color:YC[y]||YC[0],year:y,type:'class',raw};}
  return {label:raw,color:YC[0],year:0,type:'other'};
}
function slotsFor(d){const s=SCHED[d]||{};return SLOTS.map(sl=>({...sl,parsed:parse(s[sl.id]||null)}));}
function toMin(t){const[h,m]=t.split(':').map(Number);return h*60+m;}
function nowMin(){const d=new Date();return d.getHours()*60+d.getMinutes()+d.getSeconds()/60;}
function dayKey(){return['','lunes','martes','miercoles','jueves','viernes','',''][new Date().getDay()]||null;}
function pct(sl){return Math.min(100,Math.max(0,(nowMin()-toMin(sl.start))/(toMin(sl.end)-toMin(sl.start))*100));}
function rem(sl){const d=Math.max(0,toMin(sl.end)-nowMin());const h=Math.floor(d/60),m=Math.floor(d%60);return h?`${h}h ${m}min`:`${m} min`;}
function until(sl){const d=Math.max(0,toMin(sl.start)-nowMin());if(d<1)return 'ahora';const h=Math.floor(d/60),m=Math.floor(d%60);return h?`en ${h}h ${m}m`:`en ${m}min`;}
function curSlot(slots){const cm=nowMin();return slots.find(s=>!s.rec&&s.parsed&&cm>=toMin(s.start)&&cm<toMin(s.end))||null;}
function nxtSlot(slots){const cm=nowMin();return slots.find(s=>!s.rec&&s.parsed&&toMin(s.start)>cm)||null;}
function esc(s){return(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");}

// RELOJ
const MONTHS=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
const WDAYS=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
function pad(n){return String(n).padStart(2,'0');}
function updateClock(){
  const d=new Date();
  document.getElementById('live-clock').textContent=`${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
  document.getElementById('clock-day').textContent=WDAYS[d.getDay()];
}

// VIEW AHORA
function renderNow(){
  const d=new Date(),dkey=dayKey();
  document.getElementById('now-date').textContent=`${WDAYS[d.getDay()]}, ${d.getDate()} de ${MONTHS[d.getMonth()]} ${d.getFullYear()}`;
  const nEl=document.getElementById('now-content'),xEl=document.getElementById('next-content'),tEl=document.getElementById('today-tl');
  if(!dkey){
    nEl.innerHTML=`<div class="g-card free-card"><div class="free-label">Sin clases hoy</div><div class="free-sub">Disfruta el descanso</div></div>`;
    xEl.innerHTML='';tEl.innerHTML='';return;
  }
  const slots=slotsFor(dkey),cur=curSlot(slots),nxt=nxtSlot(slots),cm=nowMin();
  if(cur){
    const col=cur.parsed.color,hn=hasNotes(dkey,cur.id),p=pct(cur).toFixed(1);
    nEl.innerHTML=`<div class="g-card" style="padding-left:0">
      <div class="card-accent-bar" style="background:${col}"></div>
      <div class="card-inner">
        <div class="card-eyebrow">En este momento</div>
        <div class="card-class">${cur.parsed.label}</div>
        <div class="card-time">${cur.start} – ${cur.end}</div>
        <div class="prog-row"><span>Progreso</span><span class="prog-rem">${rem(cur)} restante</span></div>
        <div class="prog-track"><div class="prog-fill" id="prog-fill" style="background:${col};width:${p}%"></div></div>
        <button class="obs-btn${hn?' noted':''}" onclick="openModal('${dkey}','${cur.id}','${esc(cur.parsed.label)}','${cur.start} – ${cur.end}')">
          <span>Agregar observación${hn?`<span class="note-dot" style="background:${col}"></span>`:''}</span>
          <span class="obs-arrow">›</span>
        </button>
      </div>
    </div>`;
  } else if(cm>=toMin('15:25')&&cm<toMin('15:40')){
    nEl.innerHTML=`<div class="g-card free-card"><div class="free-icon">☕</div><div class="free-label">Recreo</div><div class="free-sub">${rem({end:'15:40'})} restante</div></div>`;
  } else if(cm<toMin('13:10')){
    nEl.innerHTML=`<div class="g-card free-card"><div class="free-icon">🌅</div><div class="free-label">Antes del turno</div><div class="free-sub">Clases desde las 13:10</div></div>`;
  } else if(cm>=toMin('18:40')){
    nEl.innerHTML=`<div class="g-card free-card"><div class="free-icon">🌙</div><div class="free-label">Turno finalizado</div><div class="free-sub">Hasta mañana</div></div>`;
  } else {
    nEl.innerHTML=`<div class="g-card free-card"><div class="free-icon">⏸</div><div class="free-label">Libre disponibilidad</div><div class="free-sub">Sin clase en este horario</div></div>`;
  }

  xEl.innerHTML=nxt?`<div class="g-card next-card">
    <div class="next-stripe" style="background:${nxt.parsed.color}"></div>
    <div style="flex:1">
      <div class="next-eyebrow">Siguiente clase</div>
      <div class="next-name">${nxt.parsed.label}</div>
      <div class="next-time">${nxt.start} – ${nxt.end}</div>
    </div>
    <div class="next-eta" style="color:${nxt.parsed.color}">${until(nxt)}</div>
  </div>`:'';

  const future=slots.filter(s=>!s.rec&&s.parsed&&toMin(s.start)>cm);
  if(!future.length){tEl.innerHTML='';return;}
  const rows=future.map((sl,i)=>`<div class="tl-row future" style="--icolor:${sl.parsed.color}">
    <div class="tl-gutter">
      <div class="tl-t">${sl.start}</div>
      ${i<future.length-1?'<div class="tl-line"></div>':''}
    </div>
    <div class="tl-body">
      <div class="tl-dot" style="background:${sl.parsed.color}"></div>
      <div class="tl-text">
        <div class="tl-name">${sl.parsed.label}</div>
        <div class="tl-until">hasta ${sl.end}</div>
      </div>
    </div>
  </div>`).join('');
  tEl.innerHTML=`<div class="divider"><div class="divider-lbl">Resto del día</div><div class="divider-line"></div></div><div class="timeline">${rows}</div>`;
}

function updateProg(){
  const dkey=dayKey();if(!dkey)return;
  const cur=curSlot(slotsFor(dkey));
  const f=document.getElementById('prog-fill');
  if(cur&&f)f.style.width=pct(cur).toFixed(1)+'%';
}

// VIEW DÍA
let selDay=dayKey()||'lunes';
function renderDayChips(){
  const days=['lunes','martes','miercoles','jueves','viernes'],labs=['Lun','Mar','Mié','Jue','Vie'];
  document.getElementById('day-chips').innerHTML=days.map((d,i)=>
    `<button class="day-chip${d===selDay?' active':''}" onclick="pickDay('${d}')">${labs[i]}</button>`).join('');
}
function pickDay(d){selDay=d;renderDayChips();renderDayTl();}
function renderDayTl(){
  const slots=slotsFor(selDay),cm=selDay===dayKey()?nowMin():-1;
  const rows=slots.filter(s=>!s.rec).map((sl,i,arr)=>{
    const sMin=toMin(sl.start);
    let cls='';
    if(cm>=0){if(cm>=sMin&&cm<toMin(sl.end))cls=' current';else if(sMin>cm)cls=' future';}else cls=' future';
    const col=sl.parsed?sl.parsed.color:'rgba(255,255,255,0.2)';
    const lbl=sl.parsed?sl.parsed.label:'<em style="opacity:0.4">Libre disponibilidad</em>';
    const hn=sl.parsed&&hasNotes(selDay,sl.id);
    const click=sl.parsed?`onclick="openModal('${selDay}','${sl.id}','${esc(sl.parsed.label)}','${sl.start} – ${sl.end}')" style="cursor:pointer"`:'';
    return `<div class="tl-row${cls}" ${click}>
      <div class="tl-gutter">
        <div class="tl-t">${sl.start}</div>
        ${i<arr.length-1?'<div class="tl-line"></div>':''}
      </div>
      <div class="tl-body">
        <div class="tl-dot" style="background:${col}${cls.includes('current')?';box-shadow:0 0 0 3px '+col+'44':''}"></div>
        <div class="tl-text">
          <div class="tl-name">${lbl}${hn?`<span class="note-dot" style="background:${col}"></span>`:''}</div>
          <div class="tl-until">hasta ${sl.end}</div>
        </div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('day-tl').innerHTML=`<div class="timeline">${rows||'<div class="empty-state">Sin clases</div>'}</div>`;
}

// VIEW SEMANA
function renderWeek(){
  const days=['lunes','martes','miercoles','jueves','viernes'],labs=['Lunes','Martes','Miércoles','Jueves','Viernes'];
  document.getElementById('week-content').innerHTML=days.map((d,i)=>{
    const sl=slotsFor(d).filter(s=>!s.rec&&s.parsed);
    const rows=sl.map(s=>`<div class="sched-row" style="border-left-color:${s.parsed.color}">
      <div class="sched-name">${s.parsed.label}</div>
      <div class="sched-right"><div class="sched-time">${s.start} – ${s.end}</div></div>
    </div>`).join('');
    return `<div class="year-group">
      <div class="year-head"><div class="year-htitle">${labs[i]}</div><div class="year-ct">${sl.length} clase${sl.length!==1?'s':''}</div></div>
      ${rows||'<div class="empty-state" style="padding:16px 0">Sin clases</div>'}
    </div>`;
  }).join('');
}

// VIEW HORARIO COMPLETO
function renderFull(){
  const dOrd={lunes:0,martes:1,miercoles:2,jueves:3,viernes:4};
  const dLab={lunes:'Lun',martes:'Mar',miercoles:'Mié',jueves:'Jue',viernes:'Vie'};
  const byY={1:[],2:[],3:[],4:[],0:[]};
  for(const[d,sch]of Object.entries(SCHED)){
    for(const[sid,raw]of Object.entries(sch)){
      const p=parse(raw);if(!p)continue;
      const sl=SLOTS.find(s=>s.id===sid);
      if(sl)(byY[p.year]||byY[0]).push({day:d,slot:sl,parsed:p});
    }
  }
  const yn={1:'Primer año',2:'Segundo año',3:'Tercer año',4:'Cuarto año',0:'Otros'};
  document.getElementById('full-content').innerHTML=[1,2,3,4,0].map(y=>{
    const cs=byY[y];if(!cs.length)return '';
    cs.sort((a,b)=>dOrd[a.day]-dOrd[b.day]||(toMin(a.slot.start)-toMin(b.slot.start)));
    const col=cs[0].parsed.color;
    return `<div class="year-group">
      <div class="year-head">
        <div class="year-swatch" style="background:${col}"></div>
        <div class="year-htitle" style="color:${col}">${yn[y]}</div>
        <div class="year-ct">${cs.length} sesiones</div>
      </div>
      ${cs.map(c=>`<div class="sched-row" style="border-left-color:${col}">
        <div class="sched-name">${c.parsed.label}</div>
        <div class="sched-right">
          <div class="sched-day">${dLab[c.day]}</div>
          <div class="sched-time">${c.slot.start} – ${c.slot.end}</div>
        </div>
      </div>`).join('')}
    </div>`;
  }).join('');
}

// TABS
function switchView(n,btn){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('view-'+n).classList.add('active');
  btn.classList.add('active');
  if(n==='day'){renderDayChips();renderDayTl();}
  if(n==='week')renderWeek();
  if(n==='full')renderFull();
}

// NOTAS
let mKey=null;
function nKey(d,s){return `note_${d}_${s}`;}
function hasNotes(d,s){try{const v=JSON.parse(localStorage.getItem(nKey(d,s))||'{}');return !!(v.obs||v.dest||v.inc);}catch{return false;}}
function openModal(day,sid,cls,time){
  mKey=nKey(day,sid);
  document.getElementById('m-eyebrow').textContent=time;
  document.getElementById('m-title').textContent=cls;
  const sv=JSON.parse(localStorage.getItem(mKey)||'{}');
  document.getElementById('n-obs').value=sv.obs||'';
  document.getElementById('n-dest').value=sv.dest||'';
  document.getElementById('n-inc').value=sv.inc||'';
  renderPreview(sv);
  document.getElementById('modal-overlay').classList.add('open');
}
function renderPreview(sv){
  const el=document.getElementById('saved-preview');
  if(!sv||(!sv.obs&&!sv.dest&&!sv.inc)){el.innerHTML='';return;}
  el.innerHTML=`<div class="saved-wrap">
    <div class="divider" style="margin-bottom:12px"><div class="divider-lbl">Notas anteriores</div><div class="divider-line"></div></div>
    ${sv.obs?`<div class="saved-key">Observación</div><div class="saved-val">${sv.obs}</div>`:''}
    ${sv.dest?`<div class="saved-key">Destacados</div><div class="saved-val">${sv.dest}</div>`:''}
    ${sv.inc?`<div class="saved-key">Incidencias</div><div class="saved-val">${sv.inc}</div>`:''}
  </div>`;
}
function saveNotes(){
  if(!mKey)return;
  const data={obs:document.getElementById('n-obs').value.trim(),dest:document.getElementById('n-dest').value.trim(),inc:document.getElementById('n-inc').value.trim(),ts:new Date().toISOString()};
  localStorage.setItem(mKey,JSON.stringify(data));
  renderPreview(data);
  showToast('Guardado correctamente');
  setTimeout(()=>{renderNow();if(document.getElementById('view-day').classList.contains('active'))renderDayTl();},200);
}
function closeOutside(e){if(e.target===document.getElementById('modal-overlay'))closeModal();}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

// INIT
updateClock();
setInterval(updateClock,1000);
renderNow();
setInterval(()=>{if(document.getElementById('view-now').classList.contains('active'))renderNow();},30000);
setInterval(updateProg,5000);
</script>
</body>
